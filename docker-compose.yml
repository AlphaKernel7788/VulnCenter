services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: vulnmgmt
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: test123
      DB_POSTGRESDB_DATABASE: vulnmgmt
    volumes:
      - ./n8n-data:/home/node/.n8n
      - ./n8n-files:/home/node/.n8n-files
    depends_on:
      - postgres

  python-api:
    build: ./python-api
    ports:
      - "8000:8000"

  go-api:
    build: ./go-api
    ports:
      - "8080:8080"
